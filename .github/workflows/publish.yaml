name: Publish to Cargo

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    name: publish
    environment: cargo

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish unleash-api-client-macros
        run: cargo publish --manifest-path crates/unleash-api-client-macros/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish unleash-api-client
        run: |
          for i in 1 2 3 4 5; do
            cargo publish --manifest-path crates/unleash-api-client/Cargo.toml && exit 0
            sleep 30
          done
          exit 1
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
